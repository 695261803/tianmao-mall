server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: taobao-mall-backend
  
  datasource:
    url: jdbc:h2:mem:taobao_mall;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# JWT配置
jwt:
  secret: taobaoMallSecretKey2024ForJWTToken
  expiration: 86400000 # 24小时

# 文件上传配置
file:
  upload:
    path: /uploads/
    max-size: 10MB

logging:
  level:
    com.taobao.mall: debug
    org.springframework.security: debug