server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: taobao-mall-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/taobao_mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# JWT配置
jwt:
  secret: taobaoMallSecretKey2024ForJWTToken
  expiration: 86400000 # 24小时

# 文件上传配置
file:
  upload:
    path: /uploads/
    max-size: 10MB

logging:
  level:
    com.taobao.mall: debug
    org.springframework.security: debug